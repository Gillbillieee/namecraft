<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NameCraft — AI Business Name Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8f9fc;
      --surface: rgba(255,255,255,0.78);
      --surface-solid: #ffffff;
      --border: rgba(0,0,0,0.06);
      --text: #0f172a;
      --text-secondary: #475569;
      --primary: #6366f1;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%),
                  linear-gradient(180deg, #f8f9fc 0%, #f1f5f9 100%);
      min-height: 100vh; color: var(--text);
    }
    .container { max-width: 720px; margin: 0 auto; padding: 64px 24px 48px; }
    h1 {
      text-align: center; font-size: clamp(32px, 5vw, 44px);
      font-weight: 900; letter-spacing: -0.03em; margin-bottom: 8px;
      background: var(--gradient-primary); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle {
      text-align: center; color: var(--text-secondary);
      margin-bottom: 40px; font-size: 17px; line-height: 1.6;
    }
    .card {
      background: var(--surface-solid); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px; box-shadow:
        0 20px 50px -12px rgba(99,102,241,0.1), 0 8px 20px -8px rgba(0,0,0,0.06);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gradient-primary);
    }
    label { display: block; font-weight: 650; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; letter-spacing: -0.01em; }
    input, select {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 15px; margin-bottom: 20px;
      background: var(--surface-solid); color: var(--text);
      transition: all 0.2s ease; outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .btn {
      background: var(--gradient-primary); color: white; border: none;
      padding: 16px 36px; border-radius: 9999px; font-size: 16px;
      font-weight: 700; cursor: pointer; width: 100%; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 4px 16px rgba(99,102,241,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      letter-spacing: -0.01em;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
    .btn:active { transform: translateY(0); }
    .names { display: grid; gap: 12px; margin-top: 24px; }
    .name-card {
      background: var(--surface-solid); border: 1.5px solid var(--border);
      padding: 20px; border-radius: 14px; font-size: 18px; font-weight: 600;
      text-align: center; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .name-card:hover {
      border-color: var(--primary); transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.12);
    }
    .copied { background: #dcfce7 !important; color: #16a34a !important; border-color: #86efac !important; }
  </style>
<meta name="google-adsense-account" content="ca-pub-8410225250422623">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8410225250422623" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <h1>✨ NameCraft</h1>
    <p class="subtitle">Generate unique business names with AI</p>
    
    <div class="card">
      <label>What's your business about?</label>
      <input type="text" id="description" placeholder="e.g. Eco-friendly coffee shop">
      
      <label>Style</label>
      <select id="style">
        <option value="modern">Modern</option>
        <option value="classic">Classic</option>
        <option value="creative">Creative</option>
        <option value="tech">Tech</option>
      </select>
      
      <button class="btn" onclick="generateNames()">Generate Names</button>
    </div>
    
    <div class="names" id="namesOutput"></div>
  </div>

  <script src="/src/js/app.js"></script>
</body>
</html>
